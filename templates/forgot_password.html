{% extends "base.html" %}

{% block content %}
<div class="split-screen-layout">
    <div class="split-left">
        <div class="split-left-brand">RS<span>.</span></div>
        <h1>Reset Password</h1>
        <p>Get back on track<br>with your journey</p>
    </div>

    <div class="split-right">
        <div class="auth-card-modern">
            <h2>Reset your password</h2>

            <form method="post">
                <div class="input-group">
                    <label>Email</label>
                    <input type="email" name="email" placeholder="RS@gmail.com" required>
                </div>

                <div class="input-group">
                    <label>New Password</label>
                    <input type="password" name="new_password" placeholder="Enter new password" required>
                </div>

                <button type="submit" class="btn-primary-blue">Reset Password</button>
            </form>

            <p style="text-align: center; margin-top: 25px; font-size: 13px; color: #929AAB;">
                Remembered it? <a href="/login" style="color: #0066FF; text-decoration: none; font-weight: 600;">Log
                    in</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
